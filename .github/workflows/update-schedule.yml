name: Update anime schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate schedule.json
        run: node scripts/sync-animeschedule.js
        env:
          ANIMESCHEDULE_TOKEN: ${{ secrets.ANIMESCHEDULE_TOKEN }}
          SYNC_TIMEZONE: Europe/Madrid
          SYNC_WEEKS: "8"

      - name: Commit updated schedule
        run: |
          if git diff --quiet -- schedule.json; then
            echo "schedule.json has no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git commit -m "Update anime schedule"
          git push

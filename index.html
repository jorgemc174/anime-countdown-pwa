<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>Anime Countdown</title>
  <link rel="stylesheet" href="./styles.css?v=12" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Anime Countdown</p>
        <h1>Estrenos SUB</h1>
      </div>
      <button id="settingsBtn" class="settings-top-btn" type="button" aria-label="Mostrar ajustes" aria-expanded="false">Ajustes</button>
    </header>

    <section id="statusBox" class="status-box hidden"></section>

    <div class="content-grid">
      <section class="main-panel" aria-label="Próximos episodios">
        <section id="nextRelease" class="next-release empty">
          <div class="next-title">Cargando...</div>
        </section>

        <section class="toolbar three" aria-label="Filtros">
          <button id="showAllBtn" class="tab" type="button">Todos</button>
          <button id="showTodayBtn" class="tab active" type="button">Hoy</button>
          <button id="showFavsBtn" class="tab" type="button">Favoritos</button>
        </section>

        <section id="animeList" class="anime-list"></section>
      </section>

      <section id="settingsPanel" class="settings hidden" aria-label="Ajustes">
        <div class="settings-head">
          <h2>Ajustes</h2>
          <button id="closeSettingsBtn" class="icon-btn" type="button" aria-label="Cerrar ajustes">×</button>
        </div>

        <section class="settings-group">
          <h3>Horarios</h3>
          <p class="hint">Importa los próximos episodios desde AnimeSchedule y cruza favoritos con AniList.</p>
          <button id="importBtn" class="primary-btn" type="button">Actualizar horarios</button>
          <button id="openAnimeScheduleBtn" class="secondary-btn" type="button">Abrir AnimeSchedule</button>
          <div id="importPreview" class="preview"></div>
        </section>

        <hr />

        <label>Token de AnimeSchedule
          <input id="tokenInput" autocomplete="off" placeholder="Pega aquí tu API token" />
        </label>

        <label>URL del proxy (Cloudflare Worker)
          <input id="proxyInput" autocomplete="off" placeholder="https://anime-proxy.tu-usuario.workers.dev" />
        </label>

        <label>Zona horaria
          <select id="timezoneInput"></select>
        </label>

        <div class="button-row">
          <button id="saveTokenBtn" class="secondary-btn" type="button">Guardar token</button>
          <button id="saveProxyBtn" class="secondary-btn" type="button">Guardar proxy</button>
          <button id="saveTimezoneBtn" class="secondary-btn" type="button">Guardar zona</button>
        </div>

        <hr />

        <h2>AniList</h2>
        <label>Usuario de AniList
          <input id="anilistInput" autocomplete="off" placeholder="Tu usuario público" />
        </label>
        <div class="button-row two">
          <button id="saveAnilistBtn" class="secondary-btn" type="button">Guardar usuario</button>
          <button id="syncAnilistBtn" class="primary-btn" type="button">Sincronizar</button>
        </div>

        <hr />
        <button id="resetBtn" class="danger-btn" type="button">Borrar datos</button>
      </section>
    </div>
  </main>
  <script src="./app.js?v=12"></script>
</body>
</html>

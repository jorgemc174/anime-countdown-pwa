<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
  <title>Anime Countdown</title>
  <script>
    try {
      const s = JSON.parse(localStorage.getItem("animeCountdownStorage") || "{}");
      if (s.theme === "light") document.documentElement.classList.add("light");
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="./styles.css?v=83" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Anime Countdown</p>
        <h1>Estrenos SUB</h1>
      </div>
      <button id="settingsBtn" class="settings-top-btn" type="button" aria-label="Mostrar ajustes" aria-expanded="false">Ajustes</button>
    </header>

    <section id="statusBox" class="status-box hidden" role="status" aria-live="polite"></section>

    <div id="pullIndicator" class="pull-indicator">
      <span class="pull-icon">↻</span>
    </div>

    <div class="content-grid">
      <section class="main-panel" aria-label="Próximos episodios">
        <section id="nextRelease" class="next-release empty">
          <div class="next-title">Cargando...</div>
        </section>

        <section class="toolbar three" aria-label="Filtros">
          <button id="showAllBtn" class="tab" type="button">Todos</button>
          <button id="showTodayBtn" class="tab active" type="button">Hoy</button>
          <button id="showFavsBtn" class="tab" type="button">Favoritos</button>
        </section>

        <section id="animeList" class="anime-list"></section>
      </section>

      <section id="settingsPanel" class="settings hidden" aria-label="Ajustes">
        <div class="settings-head">
          <h2>Ajustes</h2>
          <button id="closeSettingsBtn" class="icon-btn" type="button" aria-label="Cerrar ajustes">×</button>
        </div>

        <h2>AniList</h2>
        <label>Usuario de AniList
          <input id="anilistInput" autocomplete="off" placeholder="Tu usuario público" />
        </label>
        <div class="button-row">
          <button id="syncAnilistBtn" class="primary-btn" type="button">Sincronizar</button>
        </div>

        <hr />
        <label>Zona horaria
          <select id="timezoneInput"></select>
        </label>
        <label>País (verificar plataformas)
          <select id="countryInput"></select>
        </label>

        <div class="toggle-row">
          <span>Modo claro</span>
          <button id="themeBtn" class="toggle-switch" type="button" role="switch" aria-checked="false"></button>
        </div>
        <div class="toggle-row">
          <span>Mostrar nota de AniList</span>
          <button id="scoreBtn" class="toggle-switch" type="button" role="switch" aria-checked="true"></button>
        </div>

        <hr />
        <details class="platform-filter-panel">
          <summary>Mis suscripciones</summary>
          <div id="platformFilterContainer" class="platform-filter-settings"></div>
        </details>

        <hr />
        <div class="toggle-row">
          <span id="notificationLabel">Activar notificación</span>
          <button id="notificationBtn" class="toggle-switch" type="button" role="switch" aria-checked="false" aria-labelledby="notificationLabel"></button>
        </div>
        <button id="resetBtn" class="danger-btn" type="button">Borrar datos</button>
      </section>
    </div>
  </main>
  <script src="./config.js?v=83"></script>
  <script src="./app.js?v=83"></script>
</body>
</html>
